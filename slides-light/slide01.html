<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; background: #ffffff; }

  .bg {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #f8fff9 0%, #edf7f0 40%, #f0faf3 70%, #e8f5ec 100%);
    position: relative;
  }

  /* Subtle grid */
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,150,60,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,150,60,0.06) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Glow orbs */
  .orb1 {
    position: absolute; width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,160,60,0.12) 0%, transparent 70%);
    top: -200px; right: -100px;
  }
  .orb2 {
    position: absolute; width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,80,200,0.05) 0%, transparent 70%);
    bottom: -150px; left: 200px;
  }

  .content {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 0 140px;
  }

  .left { flex: 1; max-width: 1100px; text-align: center; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(0,180,60,0.1);
    border: 1px solid rgba(0,200,80,0.3);
    border-radius: 100px;
    padding: 8px 20px;
    margin-bottom: 36px;
  }
  .eyebrow-dot { width: 8px; height: 8px; border-radius: 50%; background: #00c851; }
  .eyebrow span { font-size: 15px; font-weight: 500; color: #00c851; letter-spacing: 0.05em; text-transform: uppercase; }

  h1 {
    font-size: 86px; font-weight: 800; line-height: 1.0;
    color: #0d1f12; letter-spacing: -2px; margin-bottom: 32px;
  }
  h1 em { font-style: normal; color: #00d65a; }

  .subtitle {
    font-size: 22px; font-weight: 400; color: rgba(0,20,10,0.5);
    line-height: 1.6; margin-bottom: 64px; max-width: 680px;
    margin-left: auto; margin-right: auto;
  }

  .author-card {
    display: flex; align-items: center; gap: 20px;
    justify-content: center;
  }
  .avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #00c851, #007a32);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: #0d1f12;
    flex-shrink: 0;
  }
  .author-info { }
  .author-name { font-size: 32px; font-weight: 700; color: #0d1f12; }
  .author-title { font-size: 20px; color: rgba(0,20,10,0.6); margin-top: 6px; }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #00c851 0%, #007a32 50%, transparent 100%);
  }
</style>
</head>
<body>
<div class="bg">
  <div class="orb1"></div>
  <div class="orb2"></div>

  <div class="content">
    <div class="left">
      <div class="eyebrow">
        <div class="eyebrow-dot"></div>
        <span>AI Research · NLP · African Languages</span>
      </div>

      <h1>If It Doesn't<br>Understand Me,<br>Is It <em>Really</em> Intelligent?</h1>

      <p class="subtitle">Fine-tuning OpenAI Whisper for Nigerian languages using Parameter-Efficient LoRA adaptation</p>

      <div class="author-card">
        <div class="author-info">
          <div class="author-name">Dr. Abimbola Jeremiah</div>
          <div class="author-title">Assistant Professor · Silesian University of Technology, Poland · June 2026</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
